name: CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

permissions:
  contents: read

env:
  AEGIS_DEPLOY_URL: http://localhost:3000

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-and-install:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Deploy
        uses: u84u/aegis/.github/actions/deploy-aegis-app@main
        with:
          api-url: ${{ env.AEGIS_DEPLOY_URL }}
          api-key: ${{ secrets.AEGIS_DEPLOY_API_KEY }}

      - name: Install
        uses: u84u/aegis/.github/actions/install-aegis-app@main
        with:
          api-url: ${{ env.AEGIS_DEPLOY_URL }}
          api-key: ${{ secrets.AEGIS_DEPLOY_API_KEY }}
