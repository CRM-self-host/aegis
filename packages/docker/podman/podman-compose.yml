version: "3.8"

services:
  db:
    container_name: aegis-db
    image: postgres:16
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
    volumes:
      - aegis-db-data:/var/lib/postgresql/data:Z

  redis:
    container_name: aegis-redis
    image: redis:latest
    command: ["--maxmemory-policy", "noeviction"]
    volumes:
      - aegis-redis-data:/data:Z

  server:
    container_name: server
    image: u84u/aegis:latest
    environment:
      NODE_PORT: "3000"
      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: "postgresql://aegis:${PG_DATABASE_PASSWORD}@aegis-db:5432/aegis"
      REDIS_URL: "redis://aegis-redis:6379"
      APP_SECRET: ${APP_SECRET}
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - server-data:/app/docker-data:Z
    ports:
      - 127.0.0.1:8080:3000

  worker:
    container_name: aegis-worker
    image: u84u/aegis:latest
    command: yarn worker:prod
    environment:
      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: "postgresql://aegis:${PG_DATABASE_PASSWORD}@aegis-db:5432/aegis"
      REDIS_URL: "redis://aegis-redis:6379"
      APP_SECRET: ${APP_SECRET}
      DISABLE_DB_MIGRATIONS: "true"
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - server-data:/app/docker-data:Z
    init: true

volumes:
  aegis-db-data:
  server-data:
  aegis-redis-data:
